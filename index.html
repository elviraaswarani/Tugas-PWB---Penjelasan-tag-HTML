<!DOCTYPE html>
<!-- Menentukan bahwa ini adalah dokumen HTML5 -->

<html>
<!-- Tag utama untuk membungkus seluruh isi halaman -->

<head>
    <!-- Bagian head berisi informasi tentang halaman -->

    <title>Belajar HTML Dasar</title>
    <!-- Judul yang tampil di tab browser -->
</head>

<body>
    <!-- Bagian body berisi semua konten yang ditampilkan -->

    <h1>Belajar HTML</h1>
    <!-- h1 digunakan untuk judul utama -->

    <p>Ini adalah contoh paragraf.</p>
    <!-- p digunakan untuk membuat paragraf -->

    <h2>Contoh Link</h2>
    <!-- h2 adalah sub judul -->

    <a href="https://www.google.com">Klik ke Google</a>
    <!-- a digunakan untuk membuat hyperlink -->

    <h2>Contoh Gambar</h2>

    <img src="gambar.jpg">
    <!-- img digunakan untuk menampilkan gambar -->
    <!-- src adalah sumber gambar -->
    <!-- alt adalah teks alternatif -->

    <h2>Contoh List</h2>

    <ul>
        <!-- ul adalah list tidak berurutan -->
        <li>HTML</li>
        <!-- li adalah item dalam list -->
        <li>CSS</li>
        <li>JavaScript</li>
    </ul>

    <h2>Contoh Tabel</h2>

    <table border="1">
        <!-- table digunakan untuk membuat tabel -->

        <tr>
            <!-- tr adalah baris tabel -->
            <th>Nama</th>
            <!-- th adalah header tabel -->
            <th>Kelas</th>
        </tr>

        <tr>
            <td>Elvira</td>
            <!-- td adalah isi/data tabel -->
            <td>XI RPL 2</td>
        </tr>
    </table>

</body>

</html>
